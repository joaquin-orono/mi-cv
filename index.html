let lang="en";
const U=()=>DATA.ui[lang];

function render(){
  const d=DATA, u=U();
  document.documentElement.lang=lang;
  document.querySelectorAll("[data-t]").forEach(el=>el.textContent=u[el.dataset.t]||"");

  const sec=(ic,key,inner)=>`<section class="reveal"><div class="kicker"><span class="ic">${ic}</span><h2>${u[key]}</h2></div>${inner}</section>`;

  let html="";
  html+=sec("✨","s_about",d.summary[lang].map(p=>`<p class="lead">${p}</p>`).join(""));
  html+=sec("📊","s_numbers",`<div class="stats">${d.stats[lang].map(s=>`<div class="stat"><div class="n gt">${s[0]}</div><div class="l">${s[1]}</div></div>`).join("")}</div>`);
  html+=sec("🧩","s_tech",d.tech[lang].map(g=>`<div class="techgroup"><h3>${g[0]}</h3><div class="pills">${g[1].map(p=>`<span class="pill">${p}</span>`).join("")}</div></div>`).join(""));
  html+=sec("💼","s_exp",`<div class="tl">${d.exp[lang].map(j=>`<div class="job"><h3>${j[0]} — <span class="co">${j[1]}</span></h3><div class="when">${j[2]}</div><p>${j[3]}</p></div>`).join("")}</div>`);
  html+=sec("🚀","s_feat",`<div class="grid">${d.feat[lang].map(c=>`<div class="card"><div class="top"><h3>${c[0]}</h3><span class="ind">${c[1]}</span></div><div class="yr">${c[2]}</div><div class="rolep">${c[3]}</div><p>${c[4]}</p><div class="res"><span>→</span> ${c[5]}</div></div>`).join("")}</div>`
    +`<details><summary>${u.moreFree}</summary><ul>${d.moreFree[lang].map(li=>`<li>${li}</li>`).join("")}</ul></details>`
    +`<details><summary>${u.moreEarly}</summary><ul>${d.moreEarly[lang].map(li=>`<li>${li}</li>`).join("")}</ul></details>`);
  html+=sec("🎯","s_skills",`<div class="twocol">${d.skills[lang].map(b=>`<div class="skillblock"><h3>${b[0]}</h3><ul>${b[1].map(s=>`<li>${s}</li>`).join("")}</ul></div>`).join("")}</div>`);
  html+=sec("🎓","s_edu",d.edu[lang].map(e=>`<div class="eduitem"><span class="y">${e[0]}</span><span><span class="t">${e[1]}</span> <span class="s">· ${e[2]}</span></span></div>`).join(""));

  document.getElementById("app").innerHTML=html;
  observe();
}

let io=null;
function observe(){
  if(io) io.disconnect();
  io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}}),{threshold:.1});
  document.querySelectorAll(".reveal").forEach(el=>io.observe(el));
}

document.getElementById("lang").addEventListener("click",e=>{
  const b=e.target.closest("button");if(!b)return;
  lang=b.dataset.l;
  document.querySelectorAll("#lang button").forEach(x=>x.classList.toggle("active",x===b));
  render();
});
document.getElementById("printBtn").addEventListener("click",()=>window.print());

render();
</script>
